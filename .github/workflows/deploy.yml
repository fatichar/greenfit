name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/greenfit' }}
  PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'greenfit' }}
  APP_PORT: ${{ vars.APP_PORT || '3000' }}
  APP_HOSTNAME: ${{ vars.APP_HOSTNAME || '127.0.0.1' }}
  VPS_PORT: ${{ vars.VPS_PORT || '22' }}
  REPO_URL: ${{ vars.REPO_URL || format('{0}/{1}.git', github.server_url, github.repository) }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
          BING_SITE_VERIFICATION: ${{ vars.BING_SITE_VERIFICATION }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config <<EOF
          Host greenfit-vps
            HostName $VPS_HOST
            User $VPS_USER
            Port $VPS_PORT
            IdentityFile ~/.ssh/deploy_key
            BatchMode yes
            ConnectTimeout 20
            ServerAliveInterval 30
            ServerAliveCountMax 4
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

          echo "Runner public IP:"
          curl -fsS https://api.ipify.org || true
          echo
          echo "Target: ${VPS_USER}@${VPS_HOST}:${VPS_PORT}"
          echo "DNS resolution:"
          getent hosts "$VPS_HOST" || true

          tcp_probe() {
            timeout 25s bash -c ": > /dev/tcp/${VPS_HOST}/${VPS_PORT}"
          }

          retry() {
            local attempt=1
            local max_attempts=8
            local delay=15

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi

              echo "Attempt ${attempt} failed at $(date -u +'%Y-%m-%dT%H:%M:%SZ'). Retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              if [ "$delay" -lt 120 ]; then
                delay=$((delay * 2))
              fi
            done
          }

          retry tcp_probe
          retry ssh greenfit-vps "echo SSH connection ok"

      - name: Activate release
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
          BING_SITE_VERIFICATION: ${{ vars.BING_SITE_VERIFICATION }}
        run: |
          ssh greenfit-vps \
            "GITHUB_SHA='$GITHUB_SHA' GITHUB_REF_NAME='$GITHUB_REF_NAME' REPO_URL='$REPO_URL' DEPLOY_PATH='$DEPLOY_PATH' PM2_APP_NAME='$PM2_APP_NAME' APP_PORT='$APP_PORT' APP_HOSTNAME='$APP_HOSTNAME' NEXT_PUBLIC_UMAMI_SCRIPT_URL='$NEXT_PUBLIC_UMAMI_SCRIPT_URL' NEXT_PUBLIC_UMAMI_WEBSITE_ID='$NEXT_PUBLIC_UMAMI_WEBSITE_ID' GOOGLE_SITE_VERIFICATION='$GOOGLE_SITE_VERIFICATION' BING_SITE_VERIFICATION='$BING_SITE_VERIFICATION' bash -s" <<'EOF'
          set -euo pipefail

          command -v git >/dev/null 2>&1 || {
            echo "git was not found on the VPS PATH. Install it with: sudo apt-get install -y git"
            exit 1
          }

          command -v npm >/dev/null 2>&1 || {
            echo "npm was not found on the VPS PATH. Install Node.js 22 on the VPS."
            exit 1
          }

          command -v pm2 >/dev/null 2>&1 || {
            echo "pm2 was not found on the VPS PATH. Install it with: npm install -g pm2"
            exit 1
          }

          REPO_DIR="$DEPLOY_PATH/repo"
          RELEASE_DIR="$DEPLOY_PATH/releases/$GITHUB_SHA"
          mkdir -p "$DEPLOY_PATH/releases" "$REPO_DIR"

          if [ ! -d "$REPO_DIR/.git" ]; then
            rm -rf "$REPO_DIR"
            git clone --no-checkout "$REPO_URL" "$REPO_DIR"
          fi

          git -C "$REPO_DIR" remote set-url origin "$REPO_URL"
          git -C "$REPO_DIR" fetch --prune origin "$GITHUB_REF_NAME"
          git -C "$REPO_DIR" cat-file -e "$GITHUB_SHA^{commit}"

          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          git -C "$REPO_DIR" archive "$GITHUB_SHA" | tar -x -C "$RELEASE_DIR"

          cd "$RELEASE_DIR"
          npm ci
          npm run build
          cp -a public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -a .next/static .next/standalone/.next/static
          ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"

          cat > "$DEPLOY_PATH/ecosystem.config.cjs" <<PM2_CONFIG
          module.exports = {
            apps: [
              {
                name: "$PM2_APP_NAME",
                cwd: "$DEPLOY_PATH/current/.next/standalone",
                script: "server.js",
                env: {
                  NODE_ENV: "production",
                  PORT: "$APP_PORT",
                  HOSTNAME: "$APP_HOSTNAME",
                  NEXT_PUBLIC_UMAMI_SCRIPT_URL: "$NEXT_PUBLIC_UMAMI_SCRIPT_URL",
                  NEXT_PUBLIC_UMAMI_WEBSITE_ID: "$NEXT_PUBLIC_UMAMI_WEBSITE_ID"
                }
              }
            ]
          };
          PM2_CONFIG

          pm2 delete "$PM2_APP_NAME" >/dev/null 2>&1 || true
          pm2 start "$DEPLOY_PATH/ecosystem.config.cjs" --update-env
          pm2 save
          EOF
