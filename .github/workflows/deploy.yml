name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/var/www/greenfit' }}
  PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'greenfit' }}
  APP_PORT: ${{ vars.APP_PORT || '3000' }}
  APP_HOSTNAME: ${{ vars.APP_HOSTNAME || '127.0.0.1' }}
  VPS_PORT: ${{ secrets.VPS_PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Package standalone app
        run: |
          mkdir -p deploy/.next
          cp -a .next/standalone/. deploy/
          cp -a .next/static deploy/.next/static
          cp -a public deploy/public
          tar -czf greenfit-${GITHUB_SHA}.tar.gz -C deploy .

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" greenfit-${GITHUB_SHA}.tar.gz "$VPS_USER@$VPS_HOST:/tmp/greenfit-${GITHUB_SHA}.tar.gz"

      - name: Activate release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "GITHUB_SHA='$GITHUB_SHA' DEPLOY_PATH='$DEPLOY_PATH' PM2_APP_NAME='$PM2_APP_NAME' APP_PORT='$APP_PORT' APP_HOSTNAME='$APP_HOSTNAME' bash -s" <<'EOF'
          set -euo pipefail

          RELEASE_DIR="$DEPLOY_PATH/releases/$GITHUB_SHA"
          mkdir -p "$DEPLOY_PATH/releases"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "/tmp/greenfit-$GITHUB_SHA.tar.gz" -C "$RELEASE_DIR"
          ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"

          cat > "$DEPLOY_PATH/ecosystem.config.cjs" <<PM2EOF
          module.exports = {
            apps: [
              {
                name: "$PM2_APP_NAME",
                cwd: "$DEPLOY_PATH/current",
                script: "server.js",
                env: {
                  NODE_ENV: "production",
                  PORT: "$APP_PORT",
                  HOSTNAME: "$APP_HOSTNAME"
                }
              }
            ]
          };
          PM2EOF

          pm2 startOrReload "$DEPLOY_PATH/ecosystem.config.cjs" --update-env
          pm2 save
          rm -f "/tmp/greenfit-$GITHUB_SHA.tar.gz"
          EOF
