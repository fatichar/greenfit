name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/greenfit' }}
  PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'greenfit' }}
  APP_PORT: ${{ vars.APP_PORT || '3000' }}
  APP_HOSTNAME: ${{ vars.APP_HOSTNAME || '127.0.0.1' }}
  VPS_PORT: ${{ vars.VPS_PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Package standalone app
        run: |
          mkdir -p deploy/.next
          cp -a .next/standalone/. deploy/
          cp -a .next/static deploy/.next/static
          cp -a public deploy/public
          tar -czf greenfit-${GITHUB_SHA}.tar.gz -C deploy .
          ls -lh greenfit-${GITHUB_SHA}.tar.gz
          gzip -t greenfit-${GITHUB_SHA}.tar.gz

      - name: Configure SSH
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config <<EOF
          Host greenfit-vps
            HostName $VPS_HOST
            User $VPS_USER
            Port $VPS_PORT
            IdentityFile ~/.ssh/deploy_key
            BatchMode yes
            ConnectTimeout 20
            ServerAliveInterval 30
            ServerAliveCountMax 4
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

          echo "Runner public IP:"
          curl -fsS https://api.ipify.org || true
          echo
          echo "Target: ${VPS_USER}@${VPS_HOST}:${VPS_PORT}"
          echo "DNS resolution:"
          getent hosts "$VPS_HOST" || true

          tcp_probe() {
            timeout 25s bash -c ": > /dev/tcp/${VPS_HOST}/${VPS_PORT}"
          }

          retry() {
            local attempt=1
            local max_attempts=8
            local delay=15

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi

              echo "Attempt ${attempt} failed at $(date -u +'%Y-%m-%dT%H:%M:%SZ'). Retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              if [ "$delay" -lt 120 ]; then
                delay=$((delay * 2))
              fi
            done
          }

          retry tcp_probe
          retry ssh greenfit-vps "echo SSH connection ok"

      - name: Upload release
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          retry() {
            local attempt=1
            local max_attempts=5
            local delay=20

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi

              echo "Attempt ${attempt} failed at $(date -u +'%Y-%m-%dT%H:%M:%SZ'). Retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              if [ "$delay" -lt 120 ]; then
                delay=$((delay * 2))
              fi
            done
          }

          archive="greenfit-${GITHUB_SHA}.tar.gz"
          remote_archive="/tmp/${archive}"
          local_sha="$(sha256sum "$archive" | cut -d ' ' -f1)"

          ls -lh "$archive"
          echo "Local SHA256: $local_sha"

          upload_archive() {
            timeout 600s ssh greenfit-vps "rm -f '$remote_archive' && cat > '$remote_archive'" < "$archive"
          }

          retry upload_archive

          remote_sha="$(ssh greenfit-vps "sha256sum '$remote_archive' | cut -d ' ' -f1")"
          echo "Remote SHA256: $remote_sha"
          test "$local_sha" = "$remote_sha"
          ssh greenfit-vps "ls -lh '$remote_archive' && gzip -t '$remote_archive'"

      - name: Activate release
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          ssh greenfit-vps \
            "GITHUB_SHA='$GITHUB_SHA' DEPLOY_PATH='$DEPLOY_PATH' PM2_APP_NAME='$PM2_APP_NAME' APP_PORT='$APP_PORT' APP_HOSTNAME='$APP_HOSTNAME' bash -s" <<'EOF'
          set -euo pipefail

          RELEASE_DIR="$DEPLOY_PATH/releases/$GITHUB_SHA"
          mkdir -p "$DEPLOY_PATH/releases"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "/tmp/greenfit-$GITHUB_SHA.tar.gz" -C "$RELEASE_DIR"
          ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"

          cat > "$DEPLOY_PATH/ecosystem.config.cjs" <<PM2_CONFIG
          module.exports = {
            apps: [
              {
                name: "$PM2_APP_NAME",
                cwd: "$DEPLOY_PATH/current",
                script: "server.js",
                env: {
                  NODE_ENV: "production",
                  PORT: "$APP_PORT",
                  HOSTNAME: "$APP_HOSTNAME"
                }
              }
            ]
          };
          PM2_CONFIG

          command -v pm2 >/dev/null 2>&1 || {
            echo "pm2 was not found on the VPS PATH. Install it with: npm install -g pm2"
            exit 1
          }

          pm2 startOrReload "$DEPLOY_PATH/ecosystem.config.cjs" --update-env
          pm2 save
          rm -f "/tmp/greenfit-$GITHUB_SHA.tar.gz"
          EOF
